<mat-form-field ngDefaultControl *ngIf="input" appearance="outline" class="inputField">
  <mat-select [matTooltip]="input.description[0].text" [ngModel]="selected" (ngModelChange)="onChange($event)">
    <mat-option [value]="true">
      true
    </mat-option>
    <mat-option [value]="false" >
      false
    </mat-option>
  </mat-select>
</mat-form-field>
